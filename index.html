<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Musiman</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --primary: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 2rem;
            background: white;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #eee;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .controls label {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .controls input[type="number"] {
            padding: 8px 12px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            width: 100px;
            text-align: center;
        }

        .controls input[type="number"]:focus {
            outline: none;
            border-color: #4caf50;
        }

        .calendar-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            .calendar-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .season-card {
            border-radius: 12px;
            padding: 1.5rem;
            background: white;
            border: 1px solid #eaeaea;
        }

        .season-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }

        .season-header h2 {
            margin: 0;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .semi { border-top: 6px solid #4caf50; }
        .panas { border-top: 6px solid #ffb300; }
        .gugur { border-top: 6px solid #ff5722; }
        .dingin { border-top: 6px solid #03a9f4; }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(35px, 1fr));
            gap: 6px;
        }

        .day {
            background-color: #f1f3f5;
            border: 1px solid transparent;
            border-radius: 6px;
            text-align: center;
            padding: 8px 2px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.15s ease;
            position: relative;
            user-select: none;
        }

        .day:hover {
            background-color: #e9ecef;
            transform: scale(1.08);
            border-color: #ccc;
            z-index: 2;
        }

        .day.has-note {
            background-color: #e3f2fd; /* Warna khusus untuk hari bercatatan */
            border-color: #bbdefb;
            color: #0d47a1;
        }

        .day.has-note::after {
            content: "📝";
            position: absolute;
            top: -6px;
            right: -6px;
            font-size: 0.75rem;
            background: white;
            border-radius: 50%;
            border: 1px solid #eee;
        }

        /* --- STYLING MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            transform: translateY(-20px);
            transition: transform 0.2s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .modal-overlay.show .modal {
            transform: translateY(0);
        }

        .modal h3 { margin-top: 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }

        /* Tampilan Mode Baca (View-Only) */
        .note-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            min-height: 100px;
            margin-bottom: 1rem;
            white-space: pre-wrap; /* Mempertahankan format enter/newline */
            line-height: 1.5;
            color: #495057;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.15s ease;
        }

        .btn-save { background-color: #4caf50; color: white; }
        .btn-delete { background-color: #f44336; color: white; }
        .btn-close { background-color: #e0e0e0; color: #333; }
        
        button:hover { opacity: 0.85; }
    </style>
</head>
<body>

    <header>
        <h1>Kalender Musiman</h1>
    </header>

    <div class="controls">
        <label for="yearInput">Tahun:</label>
        <input type="number" id="yearInput" min="1" max="2687" value="1">
    </div>

    <div class="calendar-container" id="calendar"></div>

    <!-- Modal Catatan -->
    <div class="modal-overlay" id="noteModal">
        <div class="modal">
            <h3 id="modalTitle">Detail Kejadian</h3>
            
            <!-- Mode Baca (View) -->
            <div id="viewMode" style="display: none;">
                <div id="noteDisplay" class="note-display"></div>
                <div class="modal-buttons">
                    <button class="btn-delete" id="btnDelete">Hapus Catatan</button>
                    <button class="btn-close" id="btnCloseView">Tutup</button>
                </div>
            </div>

            <!-- Mode Tulis (Edit) -->
            <div id="editMode" style="display: none;">
                <textarea id="noteContent" placeholder="Tulis kejadian atau catatan di hari ini..."></textarea>
                <div class="modal-buttons">
                    <button class="btn-close" id="btnCloseEdit">Batal</button>
                    <button class="btn-save" id="btnSave">Simpan</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const seasons = [
            { id: 'semi', name: 'Musim Semi', icon: '🌸', days: 90 },
            { id: 'panas', name: 'Musim Panas', icon: '☀️', days: 90 },
            { id: 'gugur', name: 'Musim Gugur', icon: '🍂', days: 90 },
            { id: 'dingin', name: 'Musim Dingin', icon: '❄️', days: 90 }
        ];

        const calendarContainer = document.getElementById('calendar');
        const yearInput = document.getElementById('yearInput');
        const modalOverlay = document.getElementById('noteModal');
        const modalTitle = document.getElementById('modalTitle');
        const noteContent = document.getElementById('noteContent');
        const noteDisplay = document.getElementById('noteDisplay');
        const viewMode = document.getElementById('viewMode');
        const editMode = document.getElementById('editMode');
        
        let currentYear = 1;
        let activeSeasonId = '';
        let activeDay = 0;

        function buildCalendarUI() {
            calendarContainer.innerHTML = ''; 

            seasons.forEach(season => {
                const seasonCard = document.createElement('div');
                seasonCard.className = `season-card ${season.id}`;

                const header = document.createElement('div');
                header.className = 'season-header';
                header.innerHTML = `
                    <h2><span>${season.icon}</span> ${season.name}</h2>
                `;
                seasonCard.appendChild(header);

                const daysGrid = document.createElement('div');
                daysGrid.className = 'days-grid';

                for (let i = 1; i <= season.days; i++) {
                    const dayElement = document.createElement('div');
                    dayElement.className = 'day';
                    dayElement.id = `day-${season.id}-${i}`;
                    dayElement.textContent = i;
                    
                    dayElement.addEventListener('click', () => openNote(season.id, season.name, i));
                    daysGrid.appendChild(dayElement);
                }

                seasonCard.appendChild(daysGrid);
                calendarContainer.appendChild(seasonCard);
            });
        }

        function getStorageKey(year, season, day) {
            return `kalender_catatan_${year}_${season}_${day}`;
        }

        function updateNotesIndicator() {
            seasons.forEach(season => {
                for (let i = 1; i <= season.days; i++) {
                    const dayElement = document.getElementById(`day-${season.id}-${i}`);
                    const key = getStorageKey(currentYear, season.id, i);
                    
                    if (localStorage.getItem(key)) {
                        dayElement.classList.add('has-note');
                    } else {
                        dayElement.classList.remove('has-note');
                    }
                }
            });
        }

        function openNote(seasonId, seasonName, day) {
            activeSeasonId = seasonId;
            activeDay = day;

            modalTitle.textContent = `Tahun ${currentYear} | ${seasonName} | Hari ${day}`;

            const key = getStorageKey(currentYear, seasonId, day);
            const savedNote = localStorage.getItem(key);
            
            if (savedNote) {
                // Jika ada catatan, tampilkan Mode Baca
                viewMode.style.display = 'block';
                editMode.style.display = 'none';
                noteDisplay.textContent = savedNote;
            } else {
                // Jika kosong, tampilkan Mode Tulis
                viewMode.style.display = 'none';
                editMode.style.display = 'block';
                noteContent.value = '';
            }
            
            // Tampilkan modal (animasi trigger)
            modalOverlay.style.display = 'flex';
            // Paksa reflow sebentar agar transisi opacity jalan
            setTimeout(() => {
                modalOverlay.classList.add('show');
                if (!savedNote) noteContent.focus();
            }, 10);
        }

        function closeNote() {
            modalOverlay.classList.remove('show');
            setTimeout(() => {
                modalOverlay.style.display = 'none';
            }, 200); // Tunggu animasi selesai baru di-hide
        }

        function saveNote() {
            const text = noteContent.value.trim();
            const key = getStorageKey(currentYear, activeSeasonId, activeDay);

            if (text !== '') {
                localStorage.setItem(key, text);
            }

            updateNotesIndicator();
            closeNote();
        }

        function deleteNote() {
            const key = getStorageKey(currentYear, activeSeasonId, activeDay);
            localStorage.removeItem(key); // Hapus dari memori
            updateNotesIndicator(); // Hilangkan ikon memo
            
            // Segera beralih ke Mode Tulis agar pengguna bisa langsung mengubah isi
            viewMode.style.display = 'none';
            editMode.style.display = 'block';
            noteContent.value = '';
            noteContent.focus();
        }

        // --- Event Listeners ---

        yearInput.addEventListener('change', (e) => {
            let val = parseInt(e.target.value);
            if (val < 1) val = 1;
            if (val > 2687) val = 2687;
            
            yearInput.value = val;
            currentYear = val;
            updateNotesIndicator(); 
        });

        // Tombol tutup dari kedua mode
        document.getElementById('btnCloseView').addEventListener('click', closeNote);
        document.getElementById('btnCloseEdit').addEventListener('click', closeNote);
        
        document.getElementById('btnSave').addEventListener('click', saveNote);
        document.getElementById('btnDelete').addEventListener('click', deleteNote);

        // Klik latar belakang hitam untuk menutup
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                closeNote();
            }
        });

        buildCalendarUI();
        updateNotesIndicator();
    </script>
</body>
</html>
